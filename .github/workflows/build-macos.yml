name: Build macOS DMG

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.5"
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Build DMG
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          DIST_DIR="$PWD/dist"
          APP_PATH="build/macos/Build/Products/Release/shimx.app"
          EXECUTABLE_PATH="$APP_PATH/Contents/MacOS/shimx"
          DMG_ROOT="$DIST_DIR/dmg-universal"
          DMG_PATH="$DIST_DIR/ShimX-$VERSION-macos-universal.dmg"

          mkdir -p "$DIST_DIR"

          flutter clean
          flutter pub get
          flutter build macos --release

          if [[ ! -d "$APP_PATH" ]]; then
            echo "Missing app bundle: $APP_PATH" >&2
            exit 1
          fi

          if [[ -f "$EXECUTABLE_PATH" ]]; then
            lipo -info "$EXECUTABLE_PATH" || true
          fi

          rm -rf "$DMG_ROOT"
          mkdir -p "$DMG_ROOT"
          cp -R "$APP_PATH" "$DMG_ROOT/"
          ln -s /Applications "$DMG_ROOT/Applications"

          hdiutil create \
            -volname "ShimX" \
            -srcfolder "$DMG_ROOT" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shimx-macos-dmg
          path: dist/*.dmg
          if-no-files-found: error
