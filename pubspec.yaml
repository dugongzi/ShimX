name: shimx
description: "shimx"
publish_to: 'none'

version: 1.0.1+101

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  hooks_riverpod: 3.0.3
  flutter_hooks: ^0.21.3+1
  go_router: ^17.2.3
  riverpod: 3.0.3
  riverpod_annotation: 3.0.3
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0
  drift: ^2.19.1+1
  sqlite3_flutter_libs: ^0.5.42
  sqlite3: ^2.4.0
  path: ^1.9.1
  file_picker: ^8.0.7
  url_launcher: ^6.3.2
  uuid: ^4.5.3
  flutter_smart_dialog: ^5.1.0
  fluttertoast: ^8.2.8
  flutter_markdown: ^0.7.7+1
  markdown: ^7.3.1
  re_editor: ^0.9.0
  re_highlight: ^0.0.3
  crypto: ^3.0.7
  encrypt: ^5.0.3
  package_info_plus: ^9.0.1
  device_info_plus: ^10.1.2
  hive: ^2.2.3
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.2.0
  flutter_cache_manager: ^3.4.1
  flutter_screenutil: ^5.9.3
  web_socket_channel: ^3.0.3
  win32: ^5.5.0
  ffi: ^2.1.3
  tray_manager: ^0.5.0
  window_manager: ^0.5.0
  toml: ^0.18.0
  mcp_dart: ^2.1.1
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: 3.0.3
  build_runner: ^2.7.1
  freezed: ^3.2.3
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.4
  image: ^4.5.4

flutter_launcher_icons:
  image_path: "assets/images/icon.png"
  windows:
    generate: true
  macos:
    generate: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/raws/
    - assets/inject/
    - assets/inject/codex_enhance/core/
    - assets/inject/codex_enhance/ui/
    - assets/inject/codex_enhance/features/
    - assets/inject/codex_enhance/runtime/
    - assets/docs/
  fonts:
    - family: AliMama
      fonts:
        - asset: assets/fonts/alimama_fang_yuan.ttf
